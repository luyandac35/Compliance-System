<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documents - CompliTrack SA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: #f8f9fa;
        }

        .card {
            border-radius: 12px;
        }

        .file-name {
            font-size: 0.9rem;
            color: #6c757d;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-primary fw-bold" href="/"><i class="fas fa-shield-alt text-warning me-2"></i>CompliTrack SA</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="employees.html">Employees</a></li>
                    <li class="nav-item"><a class="nav-link active" href="documents.html">Documents</a></li>
                    <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
                </ul>
                <button class="btn btn-outline-danger btn-sm ms-lg-3" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <h3><i class="fas fa-file-upload text-primary me-2"></i>Document Management</h3>
        <div class="mb-3">
            <a href="/dashboard.html" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
            <a href="/employees.html" class="btn btn-info btn-sm ms-2"><i class="fas fa-users"></i> Manage Employees</a>
        </div>

        <div class="row">
            <!-- Upload form -->
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <i class="fas fa-cloud-upload-alt me-2"></i>Upload Document
                    </div>
                    <div class="card-body">
                        <form id="upload-doc-form" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Select Employee</label>
                                <select id="doc-employee-select" class="form-select" required>
                                    <option value="">-- Choose an employee --</option>
                                </select>
                            </div>
                            <input type="hidden" id="doc-employee-id" />

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Document Type</label>
                                <select name="doc_type" class="form-select" required>
                                    <option value="SA_ID">South African ID</option>
                                    <option value="PASSPORT">Passport</option>
                                    <option value="WORK_PERMIT">Work Permit</option>
                                    <option value="VISA">Visa</option>
                                    <option value="CONTRACT">Contract</option>
                                    <option value="QUALIFICATION">Qualification</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Expiry Date (for permits/visas)</label>
                                <input type="date" name="expiry_date" class="form-control" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">File (image or PDF, max 10MB)</label>
                                <input type="file" name="document" class="form-control" required accept="image/*,application/pdf" />
                            </div>

                            <button type="submit" class="btn btn-success w-100"><i class="fas fa-upload me-2"></i>Upload</button>
                        </form>
                        <div id="upload-feedback" class="mt-3"></div>
                    </div>
                </div>
            </div>

            <!-- Document list -->
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">
                        <i class="fas fa-list me-2"></i>Uploaded Documents
                    </div>
                    <div class="card-body" id="documents-list">
                        <p class="text-muted text-center">Select an employee to view their documents.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (async function () {

            // ================= SUPABASE =================
            const supabase = window.supabase.createClient(
                "https://rlfywkvyjoydpbvprtdt.supabase.co",
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZnl3a3Z5am95ZHBidnBydGR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzQ2MTEsImV4cCI6MjA5NzkxMDYxMX0.oF3BnxQD0AE_47ypbIA39iV0FGICbXZJPwOgiZTcjMk"
            );

            const STORAGE_BUCKET = "documents";

            let currentUser = null;

            // ================= AUTH CHECK =================
            async function checkAdmin() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    window.location.href = "login.html";
                    return false;
                }

                currentUser = user;

                const { data: profile } = await supabase
                    .from("profiles")
                    .select("role")
                    .eq("id", user.id)
                    .single();

                if (!profile || profile.role !== "admin") {
                    alert("Access denied. Admins only.");
                    window.location.href = "index.html";
                    return false;
                }

                return true;
            }

            // ================= LOGOUT =================
            document.getElementById("logoutBtn").addEventListener("click", async () => {
                await supabase.auth.signOut();
                window.location.href = "index.html";
            });

            // ================= LOAD EMPLOYEES =================
            async function loadEmployees() {
                const { data, error } = await supabase
                    .from("employees")
                    .select("id, full_name")
                    .order("full_name");

                if (error) {
                    console.error(error);
                    alert("Failed to load employees");
                    return;
                }

                const select = document.getElementById("doc-employee-select");
                select.innerHTML = `<option value="">-- Choose employee --</option>`;

                data.forEach(emp => {
                    const opt = document.createElement("option");
                    opt.value = emp.id; // BIGINT ✔
                    opt.textContent = emp.full_name;
                    select.appendChild(opt);
                });

                select.addEventListener("change", () => {
                    const id = select.value;
                    document.getElementById("doc-employee-id").value = id;

                    if (id) loadDocuments(id);
                    else resetDocuments();
                });
            }

            function resetDocuments() {
                document.getElementById("documents-list").innerHTML =
                    `<p class="text-muted text-center">Select an employee to view documents.</p>`;
            }

            // ================= LOAD DOCUMENTS =================
            async function loadDocuments(employeeId) {

                const container = document.getElementById("documents-list");
                container.innerHTML = `<div class="text-center"><i class="fas fa-spinner fa-spin"></i> Loading...</div>`;

                const { data, error } = await supabase
                    .from("documents")
                    .select("*")
                    .eq("employee_id", employeeId)
                    .order("upload_date", { ascending: false });

                if (error) {
                    console.error(error);
                    container.innerHTML = `<div class="alert alert-danger">Failed to load documents</div>`;
                    return;
                }

                if (!data || data.length === 0) {
                    container.innerHTML = `<p class="text-muted text-center">No documents found.</p>`;
                    return;
                }

                const baseUrl = `${supabase.supabaseUrl}/storage/v1/object/public/${STORAGE_BUCKET}/`;

                container.innerHTML = data.map(doc => `
                <div class="border rounded p-3 mb-2 d-flex justify-content-between">
                    <div>
                        <strong>${doc.doc_type}</strong><br/>

                        <small class="text-muted">
                            Uploaded: ${new Date(doc.upload_date).toLocaleString()}
                        </small><br/>

                        ${doc.expiry_date ? `<small>Expires: ${doc.expiry_date}</small><br/>` : ""}

                        ${doc.is_blurry ? `<span class="badge bg-warning">Blurry</span>` : ""}
                        ${doc.is_incomplete ? `<span class="badge bg-danger">Incomplete</span>` : ""}

                        <br/>

                        <a href="${baseUrl}${doc.file_path}" target="_blank"
                           class="btn btn-sm btn-outline-primary mt-2">
                            <i class="fas fa-eye"></i> View
                        </a>
                    </div>

                    <button class="btn btn-sm btn-outline-danger delete-doc"
                            data-id="${doc.id}">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join("");

                document.querySelectorAll(".delete-doc").forEach(btn => {
                    btn.addEventListener("click", () =>
                        deleteDocument(btn.dataset.id, employeeId)
                    );
                });
            }

            // ================= DELETE DOCUMENT =================
            async function deleteDocument(docId, employeeId) {

                if (!confirm("Delete this document?")) return;

                const { data } = await supabase
                    .from("documents")
                    .select("file_path")
                    .eq("id", docId)
                    .single();

                if (data?.file_path) {
                    await supabase.storage
                        .from(STORAGE_BUCKET)
                        .remove([data.file_path]);
                }

                const { error } = await supabase
                    .from("documents")
                    .delete()
                    .eq("id", docId);

                if (error) {
                    alert("Delete failed: " + error.message);
                    return;
                }

                loadDocuments(employeeId);
            }

            // ================= UPLOAD DOCUMENT =================
            document.getElementById("upload-doc-form").addEventListener("submit", async (e) => {
                e.preventDefault();

                const btn = e.target.querySelector("button");
                btn.disabled = true;

                const formData = new FormData(e.target);

                const employeeId = document.getElementById("doc-employee-id").value;
                const file = formData.get("document");
                const docType = formData.get("doc_type");
                const expiryDate = formData.get("expiry_date") || null;

                const feedback = document.getElementById("upload-feedback");

                if (!employeeId || !file) {
                    feedback.innerHTML = `<div class="alert alert-warning">Select employee and file</div>`;
                    btn.disabled = false;
                    return;
                }

                // file validation
                if (file.size > 10 * 1024 * 1024) {
                    feedback.innerHTML = `<div class="alert alert-danger">File too large (max 10MB)</div>`;
                    btn.disabled = false;
                    return;
                }

                const ext = file.name.split(".").pop() || "file";
                const filePath = `${employeeId}/${docType}_${Date.now()}.${ext}`;

                feedback.innerHTML = `<div class="alert alert-info">Uploading...</div>`;

                try {

                    // 1. upload file
                    const { error: uploadError } = await supabase.storage
                        .from(STORAGE_BUCKET)
                        .upload(filePath, file);

                    if (uploadError) throw uploadError;

                    // 2. insert DB record (MATCH YOUR SCHEMA ✔)
                    const { error: dbError } = await supabase
                        .from("documents")
                        .insert([{
                            employee_id: Number(employeeId),
                            doc_type: docType,
                            file_path: filePath,
                            expiry_date: expiryDate,
                            uploaded_by: currentUser.id,
                            upload_date: new Date().toISOString(),
                            is_blurry: false,
                            is_incomplete: false
                        }]);

                    if (dbError) {
                        await supabase.storage.from(STORAGE_BUCKET).remove([filePath]);
                        throw dbError;
                    }

                    feedback.innerHTML = `<div class="alert alert-success">Upload successful 🎉</div>`;
                    e.target.reset();
                    loadDocuments(employeeId);

                } catch (err) {
                    console.error(err);
                    feedback.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
                }

                btn.disabled = false;
            });

            // ================= INIT =================
            if (await checkAdmin()) {
                await loadEmployees();
            }

        })();
    </script>
</body>
</html>
