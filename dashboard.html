        .card-header {

        }
        .other-input {
            display: none;

        }
        .alert-item {
            border-left: 4px solid;

        }

        function addRequirement(select, textareaId) {
            const textarea = document.getElementById(textareaId);
            const value = select.value;
            if (value) {
                const current = textarea.value.trim();
                if (current) {
                    textarea.value = current + "\n• " + value;
                } else {
                    textarea.value = "• " + value;
                }
                select.value = '';
            }
        }

        function toggleOther(select, inputId) {
            const input = document.getElementById(inputId);
            if (select.value === 'Other') {
                input.style.display = 'block';
                input.required = true;
            } else {
                input.style.display = 'none';
                input.required = false;
                input.value = '';
            }
        }

        function getFieldValue(selectId, otherId) {
            const select = document.getElementById(selectId);
            if (select.value === 'Other') {
                return document.getElementById(otherId).value.trim() || '';
            }
            return select.value;
        }

        function setSelectAndOther(selectId, otherId, value) {
            const select = document.getElementById(selectId);
            const other = document.getElementById(otherId);
            const options = select.options;
            let found = false;
            for (let i = 0; i < options.length; i++) {
                if (options[i].value.toLowerCase() === value.toLowerCase()) {
                    select.value = options[i].value;
                    found = true;
                    break;
                }
            }
            if (!found && value) {
                select.value = 'Other';
                other.value = value;
                other.style.display = 'block';
                other.required = true;
            } else {
                other.value = '';
                other.style.display = 'none';
                other.required = false;
            }
        }

                            <p>${err.message}</p>
                            <button class="btn btn-primary" onclick="location.reload()">Retry</button>
                        </div>`;
                }
            }

            // ---------- Stats + High‑Risk based on Passport expiry ----------
            let complianceChart = null;
            async function loadStatsAndHighRisk() {
                try {
                    const { data: employees, error } = await supabase
                        .from('employees')
                        .select('id, full_name, id_passport_number, nationality, job_position');
                    if (error) throw new Error('Failed to fetch employees: ' + error.message);

                    const empIds = employees.map(e => e.id);
                    // Fetch PASSPORT documents
                    const { data: passportDocs, error: docErr } = await supabase
                        .from('documents')
                        .select('employee_id, expiry_date')
                        .eq('doc_type', 'PASSPORT')
                        .in('employee_id', empIds);
                    if (docErr) throw docErr;

                    const expiryMap = {};
                    passportDocs.forEach(d => { expiryMap[d.employee_id] = d.expiry_date; });

                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const thirtyDaysLater = new Date(today);
                    thirtyDaysLater.setDate(today.getDate() + 30);

                    let total = employees.length;
                    let validPassport = 0;
                    let expiredPassport = 0;
                    let missingPassport = 0;
                    let highRiskEmployees = [];
                    let expiredPermitsCount = 0;

                    for (const emp of employees) {
                        const expiredPermits = await getExpiredPermits(emp.id);
                        expiredPermitsCount += expiredPermits.length;

                        const expiry = expiryMap[emp.id] || null;
                        if (expiry) {
                            const expDate = new Date(expiry);
                            expDate.setHours(0, 0, 0, 0);
                            if (expDate < today) {
                                expiredPassport++;
                                highRiskEmployees.push({
                                    ...emp,
                                    riskFactor: 'Passport expired on ' + expDate.toLocaleDateString()
                                });
                            } else if (expDate <= thirtyDaysLater) {
                                validPassport++; // still valid but expiring soon
                            } else {
                                validPassport++;
                            }
                        } else {
                            missingPassport++;
                        }
                    }

                    document.getElementById('total-employees').textContent = total;
                    document.getElementById('valid-passport-count').textContent = validPassport;
                    document.getElementById('expired-permits-count').textContent = expiredPermitsCount;
                    document.getElementById('expired-passport-count').textContent = expiredPassport;
                    document.getElementById('highrisk-badge').textContent = expiredPassport;

                    const riskTbody = document.getElementById('highrisk-tbody');
                    if (highRiskEmployees.length === 0) {
                        riskTbody.innerHTML = '<tr><td colspan="4" class="text-center text-success">✅ No employees with expired passports.</td></tr>';
                    } else {
                        riskTbody.innerHTML = highRiskEmployees.map(emp => `
                            <tr>
                                <td><strong>${emp.full_name}</strong></td>
                                <td>${emp.id_passport_number}</td>
                                <td>${emp.nationality}</td>
                                <td><span class="badge bg-danger">${emp.riskFactor}</span></td>
                            </tr>
                        `).join('');
                    }

                    // Chart – now using Passport labels
                    const ctx = document.getElementById('complianceChart').getContext('2d');
                    if (complianceChart) complianceChart.destroy();
                    complianceChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Valid Passport', 'Expired Passport', 'Missing Passport', 'Expired Permits (info)'],
                            datasets: [{
                                data: [validPassport, expiredPassport, missingPassport, expiredPermitsCount],
                                backgroundColor: ['#1cc88a', '#e74a3b', '#fd7e14', '#f6c23e']
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                    });
                    console.log('✅ Stats & high‑risk loaded (passport-based)');

                    // Generate alerts
                    await generateAlerts(employees, expiryMap, today, thirtyDaysLater);

                } catch (err) {
                    console.error('Stats error:', err);
                    document.getElementById('alerts-list').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
                }
            }

            // ---------- Generate dynamic alerts (Passport-focused) ----------
            async function generateAlerts(employees, expiryMap, today, thirtyDaysLater) {
                const container = document.getElementById('alerts-list');
                let alerts = [];

                for (const emp of employees) {
                    const expiry = expiryMap[emp.id] || null;
                    if (expiry) {
                        const expDate = new Date(expiry);
                        expDate.setHours(0, 0, 0, 0);
                        if (expDate < today) {
                            alerts.push({
                                severity: 'danger',
                                icon: 'fa-exclamation-circle',
                                msg: `<strong>${emp.full_name}</strong> – Passport expired on ${expDate.toLocaleDateString()}. Please renew immediately.`,
                                badge: 'Expired'
                            });
                        } else if (expDate <= thirtyDaysLater) {
                            alerts.push({
                                severity: 'warning',
                                icon: 'fa-clock',
                                msg: `<strong>${emp.full_name}</strong> – Passport expires on ${expDate.toLocaleDateString()} (within 30 days). Please renew soon.`,
                                badge: 'Expiring'
                            });
                        }
                    } else {
                        alerts.push({
                            severity: 'info',
                            icon: 'fa-info-circle',
                            msg: `<strong>${emp.full_name}</strong> – No passport document uploaded. Please upload a valid passport.`,
                            badge: 'Missing'
                        });
                    }

                    // Check for expired permits
                    const expiredPermits = await getExpiredPermits(emp.id);
                    if (expiredPermits.length > 0) {
                        const types = expiredPermits.map(p => p.doc_type).join(', ');
                        alerts.push({
                            severity: 'danger',
                            icon: 'fa-file-contract',
                            msg: `<strong>${emp.full_name}</strong> – Expired permit(s): ${types}. Please renew immediately.`,
                            badge: 'Expired Permit'
                        });
                    }
                }

                // Sort: danger first, then warning, then info
                const order = { danger: 0, warning: 1, info: 2 };
                alerts.sort((a, b) => order[a.severity] - order[b.severity]);
                const topAlerts = alerts.slice(0, 10);

                if (topAlerts.length === 0) {
                    container.innerHTML = '<p class="text-success"><i class="fas fa-check-circle me-1"></i> No active alerts – all compliance looks good!</p>';
                    return;
                }

                container.innerHTML = topAlerts.map(a => `
                    <div class="alert-item ${a.severity}">
                        <span class="icon"><i class="fas ${a.icon}"></i></span>
                        <span class="msg">${a.msg}</span>
                        <span class="badge-severity ${a.severity}">${a.badge}</span>
                    </div>
                `).join('');
            }

            // ---------- Recent Employees ----------
            async function loadRecentEmployees() {
                const tbody = document.getElementById('recent-employees-tbody');
                try {
                    const { data: employees, error } = await supabase
                        .from('employees')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(5);
                    if (error) throw error;
                    if (!employees || employees.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No employees found.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = employees.map(emp => `
                        <tr>
                            <td><strong>${emp.full_name}</strong></td>
                            <td>${emp.id_passport_number}</td>
                            <td>${emp.nationality}</td>
                            <td>${emp.job_position || 'N/A'}</td>
                            <td><span class="badge bg-success">Active</span></td>
                        </tr>
                    `).join('');
                } catch (err) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading employees: ${err.message}</td></tr>`;
                }
            }

            // ---------- Job functions (unchanged) ----------
            async function handleJobPost(e) {
                e.preventDefault();
                const title = getFieldValue('job-title-select', 'job-title-other') || document.getElementById('job-title-other').value.trim();
                const company = document.getElementById('job-company').value.trim();
                const location = getFieldValue('job-location-select', 'job-location-other') || document.getElementById('job-location-other').value.trim();
                const salary = getFieldValue('job-salary-select', 'job-salary-other') || document.getElementById('job-salary-other').value.trim();
                const description = document.getElementById('job-description').value.trim();
                const status = document.getElementById('job-status').value;

                if (!title || !company || !location || !description) {
                    document.getElementById('job-post-feedback').innerHTML = `<div class="alert alert-danger">Please fill in all required fields.</div>`;
                    return;
                }

                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    document.getElementById('job-post-feedback').innerHTML = `<div class="alert alert-danger">You must be logged in as admin.</div>`;
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('jobs')
                        .insert([{
                            title,
                            company,
                            location,
                            salary: salary || null,
                            description,
                            status,
                            user_id: user.id
                        }]);
                    if (error) throw error;
                    document.getElementById('job-post-feedback').innerHTML = `<div class="alert alert-success">✅ Job posted successfully!</div>`;
                    document.getElementById('job-posting-form').reset();
                    document.querySelectorAll('.other-input').forEach(el => el.style.display = 'none');
                    loadJobsTable();
                } catch (err) {
                    console.error('Job post error:', err);
                    document.getElementById('job-post-feedback').innerHTML = `<div class="alert alert-danger">Failed to post job: ${err.message}</div>`;
                }
            }

            async function loadJobsTable() {
                const tbody = document.getElementById('jobs-table-body');
                const countBadge = document.getElementById('job-count');
                try {
                    const { data: jobs, error } = await supabase
                        .from('jobs')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (error) throw error;
                    if (!jobs || jobs.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No jobs posted.</td></tr>';
                        countBadge.textContent = '0';
                        return;
                    }
                    countBadge.textContent = jobs.length;
                    tbody.innerHTML = jobs.map(job => `
                        <tr>
                            <td>${job.title}</td>
                            <td>${job.company}</td>
                            <td>${job.location || 'Remote'}</td>
                            <td>${job.salary || 'N/A'}</td>
                            <td><span class="badge ${job.status === 'open' ? 'bg-success' : 'bg-secondary'}">${job.status}</span></td>
                            <td>${new Date(job.created_at).toLocaleDateString()}</td>
                            <td>
                                <button class="btn btn-sm btn-warning edit-job-btn" data-id="${job.id}"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-danger delete-job-btn" data-id="${job.id}"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');

                    document.querySelectorAll('.edit-job-btn').forEach(btn => btn.addEventListener('click', () => openEditJobModal(btn.dataset.id)));
                    document.querySelectorAll('.delete-job-btn').forEach(btn => btn.addEventListener('click', () => deleteJob(btn.dataset.id)));
                } catch (err) {
                    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-danger">Error loading jobs: ${err.message}</td></tr>`;
                }
            }

            async function openEditJobModal(jobId) {
                try {
                    const { data: job, error } = await supabase
                        .from('jobs')
                        .select('*')
                        .eq('id', jobId)
                        .single();
                    if (error) throw error;
                    document.getElementById('edit-job-id').value = job.id;
                    setSelectAndOther('edit-job-title-select', 'edit-job-title-other', job.title);
                    document.getElementById('edit-job-company').value = job.company;
                    setSelectAndOther('edit-job-location-select', 'edit-job-location-other', job.location || '');
                    setSelectAndOther('edit-job-salary-select', 'edit-job-salary-other', job.salary || '');
                    document.getElementById('edit-job-status').value = job.status;
                    document.getElementById('edit-job-description').value = job.description || '';
                    document.getElementById('edit-requirements-select').value = '';
                    new bootstrap.Modal(document.getElementById('jobEditModal')).show();
                } catch (err) {
                    alert('Error loading job: ' + err.message);
                }
            }

            async function handleJobEdit(e) {
                e.preventDefault();
                const id = document.getElementById('edit-job-id').value;
                const title = getFieldValue('edit-job-title-select', 'edit-job-title-other') || document.getElementById('edit-job-title-other').value.trim();
                const company = document.getElementById('edit-job-company').value.trim();
                const location = getFieldValue('edit-job-location-select', 'edit-job-location-other') || document.getElementById('edit-job-location-other').value.trim();
                const salary = getFieldValue('edit-job-salary-select', 'edit-job-salary-other') || document.getElementById('edit-job-salary-other').value.trim();
                const description = document.getElementById('edit-job-description').value.trim();
                const status = document.getElementById('edit-job-status').value;
                const payload = { title, company, location, salary, description, status };
                try {
                    const { error } = await supabase
                        .from('jobs')
                        .update(payload)
                        .eq('id', id);
                    if (error) throw error;
                    bootstrap.Modal.getInstance(document.getElementById('jobEditModal')).hide();
                    loadJobsTable();
                } catch (err) {
                    alert('Update failed: ' + err.message);
                }
            }

            async function deleteJob(jobId) {
                if (!confirm('Delete this job?')) return;
                try {
                    const { error } = await supabase
                        .from('jobs')
                        .delete()
                        .eq('id', jobId);
                    if (error) throw error;
                    loadJobsTable();
                } catch (err) {
                    alert('Delete failed: ' + err.message);
                }
            }

            // ---------- Logout ----------
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = "index.html";
            });

            // ---------- Start ----------
            await renderDashboard();
        })();
    </script>
</body>
</html>
