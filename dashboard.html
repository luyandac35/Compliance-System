            // ---------- Helpers ----------
            async function getMissingDocuments(employeeId, nationality) {
                try {
                    const { data: docs } = await supabase
                        .from('documents')
                        .select('doc_type')
                        .eq('employee_id', employeeId);
                    const existing = docs.map(d => d.doc_type);
                    const required = ['CONTRACT'];
                    if (nationality === 'South Africa') required.push('SA_ID');
                    else required.push('PASSPORT', 'WORK_PERMIT');
                    return required.filter(t => !existing.includes(t));
                } catch (e) { return []; }
            }

            async function getExpiredPermits(employeeId) {
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const { data } = await supabase
                        .from('documents')
                        .select('doc_type, expiry_date')
                        .eq('employee_id', employeeId)
                        .in('doc_type', ['WORK_PERMIT', 'VISA'])
                        .lt('expiry_date', today);
                    return data || [];
                } catch (e) { return []; }
            }

                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label fw-semibold">Company</label>
                                                    <input type="text" id="job-company" class="form-control" placeholder="e.g. CompliTrack SA" required />
                                                </div>
                                                <div class="col-md-4">
                                                    <label class="form-label fw-semibold">Location</label>
                                                    <input type="text" id="job-location" class="form-control" placeholder="e.g. Cape Town / Remote" required />
                                                </div>
                                                <div class="col-md-4">
                                                    <label class="form-label fw-semibold">Salary (optional)</label>
                                                    <input type="text" id="job-salary" class="form-control" placeholder="e.g. R40,000 – R55,000" />
                                                </div>
                                                <div class="col-md-4">
                                                    <label class="form-label fw-semibold">Status</label>
                                                    <select id="job-status" class="form-select">
                                                        <option value="open">Open</option>
                                                        <option value="closed">Closed</option>
                                                    </select>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label fw-semibold">Job Type</label>
                                                    <select id="job-type" class="form-select">
                                                        <option value="Full-time">Full-time</option>
                                                        <option value="Part-time">Part-time</option>
                                                        <option value="Contract">Contract</option>
                                                        <option value="Internship">Internship</option>
                                                        <option value="Temporary">Temporary</option>
                                                    </select>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label fw-semibold">Department</label>
                                                    <select id="job-department" class="form-select">
                                                        <option value="IT">IT</option>
                                                        <option value="HR">HR</option>
                                                        <option value="Finance">Finance</option>
                                                        <option value="Marketing">Marketing</option>
                                                        <option value="Sales">Sales</option>
                                                        <option value="Operations">Operations</option>
                                                        <option value="Other">Other</option>
                                                    </select>
                                                </div>
                                                <div class="col-12">
                                                    <label class="form-label fw-semibold">Application Link (URL)</label>
                                                    <input type="url" id="job-apply-link" class="form-control" placeholder="https://example.com/apply" />
                                                </div>

                        <!-- Manage Jobs Table -->
                        <div class="row">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-header d-flex justify-content-between align-items-center">
                                        <span><i class="fas fa-briefcase me-2"></i>Manage Jobs</span>
                                        <span class="badge bg-info" id="job-count">0</span>
                                    </div>
                                    <div class="card-body p-0">
                                        <div class="table-responsive">
                                            <table class="table table-hover mb-0">
                                                <thead>
                                                    <tr>
                                                        <th>Title</th>
                                                        <th>Company</th>
                                                        <th>Location</th>
                                                        <th>Type</th>
                                                        <th>Department</th>
                                                        <th>Apply Link</th>
                                                        <th>Status</th>

                                                        <th>Actions</th>

                    `;

                    await loadJobsTable();

                    document.getElementById('job-posting-form').addEventListener('submit', handleJobPost);

                    // Set up job edit form
                    document.getElementById('job-edit-form').addEventListener('submit', handleJobEdit);

                } catch (err) {
                    console.error('🔥 Dashboard error:', err);
                    container.innerHTML = `
                        <div class="alert alert-danger">
                            <h4><i class="fas fa-exclamation-circle"></i> Dashboard Error</h4>

                        </div>
                    `;
                }
            }

            // ---------- Stats + High‑Risk Employees ----------
            let complianceChart = null;

            async function loadStatsAndHighRisk() {
                try {
                    const { data: employees, error } = await supabase
                        .from('employees')
                        .select('id, full_name, id_passport_number, nationality, job_position');
                    if (error) throw new Error('Failed to fetch employees: ' + error.message);

                    const total = employees ? employees.length : 0;
                    let compliant = 0, expiredCount = 0, highRisk = 0, missingDocs = 0;
                    let highRiskEmployees = [];

                    let allAlerts = [];
                    try {
                        const { data } = await supabase.from('alerts').select('id, employee_id').eq('resolved', false);
                        allAlerts = data || [];
                    } catch (e) { console.warn('Alerts table missing:', e); }

                    if (employees && employees.length) {
                        for (const emp of employees) {
                            const missing = await getMissingDocuments(emp.id, emp.nationality);
                            const expired = await getExpiredPermits(emp.id);
                            const unresolved = allAlerts.filter(a => a.employee_id === emp.id);
                            let riskFactors = [];
                            if (missing.length) { missingDocs++; riskFactors.push('Missing: ' + missing.join(', ')); }
                            if (expired.length) { expiredCount += expired.length; riskFactors.push('Expired: ' + expired.map(p => p.doc_type).join(', ')); }
                            if (unresolved.length) riskFactors.push('Active alert');

                            if (riskFactors.length) {
                                highRisk++;
                                highRiskEmployees.push({
                                    ...emp,
                                    riskFactors: riskFactors.join('; ')
                                });
                            } else {
                                compliant++;
                            }
                        }
                    }

                    // Update stats
                    document.getElementById('total-employees').textContent = total;
                    document.getElementById('compliant-count').textContent = compliant;
                    document.getElementById('expired-count').textContent = expiredCount;
                    document.getElementById('highrisk-count').textContent = highRisk;
                    document.getElementById('highrisk-badge').textContent = highRisk;

                    // Render high‑risk table
                    const riskTbody = document.getElementById('highrisk-tbody');
                    if (highRiskEmployees.length === 0) {
                        riskTbody.innerHTML = '<tr><td colspan="4" class="text-center text-success">✅ No high‑risk employees.</td></tr>';
                    } else {
                        riskTbody.innerHTML = highRiskEmployees.map(emp => `
                            <tr>
                                <td><strong>${emp.full_name}</strong></td>
                                <td>${emp.id_passport_number}</td>
                                <td>${emp.nationality}</td>
                                <td><span class="badge bg-danger risk-badge">${emp.riskFactors}</span></td>
                            </tr>
                        `).join('');
                    }

                    // Chart
                    const ctx = document.getElementById('complianceChart').getContext('2d');
                    if (complianceChart) complianceChart.destroy();
                    complianceChart = new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: ['Compliant', 'Expired Permits', 'Missing Docs', 'High Risk'],
                            datasets: [{
                                data: [compliant, expiredCount, missingDocs, highRisk],
                                backgroundColor: ['#1cc88a', '#f6c23e', '#fd7e14', '#e74a3b']
                            }]
                        },
                        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                    });
                    console.log('✅ Stats & high‑risk loaded');

                    await loadAlerts();
                } catch (err) {
                    console.error('Stats error:', err);
                    document.getElementById('alerts-list').innerHTML = `<div class="alert alert-danger">Error: ${err.message}</div>`;
                }
            }

            async function loadAlerts() {
                const container = document.getElementById('alerts-list');
                try {
                    const { data: alerts, error } = await supabase
                        .from('alerts')
                        .select('id, employee_id, description')
                        .eq('resolved', false)
                        .order('created_at', { ascending: false })
                        .limit(10);
                    if (error) throw error;

                    if (!alerts || alerts.length === 0) {
                        container.innerHTML = '<p class="text-success"><i class="fas fa-check-circle me-1"></i> No active alerts</p>';
                        return;
                    }

                    const enriched = await Promise.all(alerts.map(async (a) => {
                        const { data: emp } = await supabase.from('employees').select('full_name').eq('id', a.employee_id).single();
                        return { ...a, employee_name: emp ? emp.full_name : 'Unknown' };
                    }));

                    container.innerHTML = enriched.map(a => `
                        <div class="alert alert-warning py-2 mb-1">
                            <i class="fas fa-exclamation-triangle me-1"></i>
                            <strong>${a.employee_name}</strong>: ${a.description}
                        </div>
                    `).join('');
                } catch (err) {
                    container.innerHTML = `<p class="text-muted">Could not load alerts: ${err.message}</p>`;
                }
            }

            // ---------- Recent Employees ----------
            async function loadRecentEmployees() {
                const tbody = document.getElementById('recent-employees-tbody');
                try {
                    const { data: employees, error } = await supabase
                        .from('employees')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(5);
                    if (error) throw error;

                    if (!employees || employees.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No employees found.</td></tr>';
                        return;
                    }

                    tbody.innerHTML = employees.map(emp => `
                        <tr>
                            <td><strong>${emp.full_name}</strong></td>
                            <td>${emp.id_passport_number}</td>
                            <td>${emp.nationality}</td>
                            <td>${emp.job_position || 'N/A'}</td>
                            <td><span class="badge bg-success">Active</span></td>
                        </tr>
                    `).join('');
                } catch (err) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error loading employees: ${err.message}</td></tr>`;
                }
            }

            // ---------- Job Posting (with new fields) ----------
            async function handleJobPost(e) {
                e.preventDefault();
                const title = document.getElementById('job-title').value.trim();
                const company = document.getElementById('job-company').value.trim();
                const location = document.getElementById('job-location').value.trim();
                const salary = document.getElementById('job-salary').value.trim();
                const description = document.getElementById('job-description').value.trim();
                const status = document.getElementById('job-status').value;
                const jobType = document.getElementById('job-type').value;
                const department = document.getElementById('job-department').value;
                const applyLink = document.getElementById('job-apply-link').value.trim();

                if (!title || !company || !location || !description) {
                    document.getElementById('job-post-feedback').innerHTML = `<div class="alert alert-danger">Please fill in all required fields.</div>`;
                    return;
                }

                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    document.getElementById('job-post-feedback').innerHTML = `<div class="alert alert-danger">You must be logged in as admin.</div>`;
                    return;
                }

                try {
                    const { error } = await supabase
                        .from('jobs')
                        .insert([{
                            title,
                            company,
                            location,
                            salary: salary || null,
                            description,
                            status,
                            job_type: jobType,
                            department: department,
                            apply_link: applyLink || null,
                            user_id: user.id
                        }]);

                    if (error) throw error;

                    document.getElementById('job-post-feedback').innerHTML = `<div class="alert alert-success">✅ Job posted successfully!</div>`;
                    document.getElementById('job-posting-form').reset();
                    loadJobsTable();
                } catch (err) {
                    console.error('Job post error:', err);
                    document.getElementById('job-post-feedback').innerHTML = `<div class="alert alert-danger">Failed to post job: ${err.message}</div>`;
                }
            }

            // ---------- Load Jobs Table (with new columns) ----------
            async function loadJobsTable() {
                const tbody = document.getElementById('jobs-table-body');
                const countBadge = document.getElementById('job-count');
                try {
                    const { data: jobs, error } = await supabase
                        .from('jobs')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (error) throw error;

                    if (!jobs || jobs.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted">No jobs posted.</td></tr>';
                        countBadge.textContent = '0';
                        return;
                    }

                    countBadge.textContent = jobs.length;
                    tbody.innerHTML = jobs.map(job => `
                        <tr>
                            <td>${job.title}</td>
                            <td>${job.company}</td>
                            <td>${job.location || 'Remote'}</td>
                            <td>${job.job_type || 'N/A'}</td>
                            <td>${job.department || 'N/A'}</td>
                            <td>${job.apply_link ? `<a href="${job.apply_link}" target="_blank" class="btn btn-sm btn-outline-primary"><i class="fas fa-external-link-alt"></i></a>` : 'None'}</td>
                            <td><span class="badge ${job.status === 'open' ? 'bg-success' : 'bg-secondary'}">${job.status}</span></td>
                            <td>${new Date(job.created_at).toLocaleDateString()}</td>
                            <td>
                                <button class="btn btn-sm btn-warning edit-job-btn" data-id="${job.id}"><i class="fas fa-edit"></i></button>
                                <button class="btn btn-sm btn-danger delete-job-btn" data-id="${job.id}"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');

                    document.querySelectorAll('.edit-job-btn').forEach(btn => btn.addEventListener('click', () => openEditJobModal(btn.dataset.id)));
                    document.querySelectorAll('.delete-job-btn').forEach(btn => btn.addEventListener('click', () => deleteJob(btn.dataset.id)));
                } catch (err) {
                    tbody.innerHTML = `<tr><td colspan="9" class="text-center text-danger">Error loading jobs: ${err.message}</td></tr>`;
                }
            }

            // ---------- Edit / Update / Delete Job (updated with new fields) ----------
            async function openEditJobModal(jobId) {
                try {
                    const { data: job, error } = await supabase
                        .from('jobs')
                        .select('*')
                        .eq('id', jobId)
                        .single();
                    if (error) throw error;
                    document.getElementById('edit-job-id').value = job.id;
                    document.getElementById('edit-job-title').value = job.title;
                    document.getElementById('edit-job-company').value = job.company;
                    document.getElementById('edit-job-location').value = job.location || '';
                    document.getElementById('edit-job-salary').value = job.salary || '';
                    document.getElementById('edit-job-description').value = job.description || '';
                    document.getElementById('edit-job-status').value = job.status;
                    document.getElementById('edit-job-type').value = job.job_type || 'Full-time';
                    document.getElementById('edit-job-department').value = job.department || 'IT';
                    document.getElementById('edit-job-apply-link').value = job.apply_link || '';
                    new bootstrap.Modal(document.getElementById('jobEditModal')).show();
                } catch (err) {
                    alert('Error loading job: ' + err.message);
                }
            }

            async function handleJobEdit(e) {
                e.preventDefault();
                const id = document.getElementById('edit-job-id').value;
                const payload = {
                    title: document.getElementById('edit-job-title').value.trim(),
                    company: document.getElementById('edit-job-company').value.trim(),
                    location: document.getElementById('edit-job-location').value.trim(),
                    salary: document.getElementById('edit-job-salary').value.trim(),
                    description: document.getElementById('edit-job-description').value.trim(),
                    status: document.getElementById('edit-job-status').value,
                    job_type: document.getElementById('edit-job-type').value,
                    department: document.getElementById('edit-job-department').value,
                    apply_link: document.getElementById('edit-job-apply-link').value.trim() || null
                };
                try {
                    const { error } = await supabase
                        .from('jobs')
                        .update(payload)
                        .eq('id', id);
                    if (error) throw error;
                    bootstrap.Modal.getInstance(document.getElementById('jobEditModal')).hide();
                    loadJobsTable();
                } catch (err) {
                    alert('Update failed: ' + err.message);
                }
            }

            async function deleteJob(jobId) {
                if (!confirm('Delete this job?')) return;
                try {
                    const { error } = await supabase
                        .from('jobs')
                        .delete()
                        .eq('id', jobId);
                    if (error) throw error;
                    loadJobsTable();
                } catch (err) {
                    alert('Delete failed: ' + err.message);
                }
            }

            // ---------- Logout ----------
            document.getElementById('logoutBtn').addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = "index.html";
            });

            // ---------- Start ----------
            await renderDashboard();
        })();
    </script>

</body>
</html>
