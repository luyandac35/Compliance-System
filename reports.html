<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports - CompliTrack SA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top">
        <div class="container">
            <a class="navbar-brand text-primary" href="/"><i class="fas fa-shield-alt text-warning"></i> CompliTrack SA</a>
            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="employees.html">Employees</a></li>
                    <li class="nav-item"><a class="nav-link" href="documents.html">Documents</a></li>
                </ul>
                <button class="btn btn-danger btn-sm ms-lg-3" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3><i class="fas fa-file-alt"></i> Compliance Reports</h3>
            <button id="generate-report" class="btn btn-primary"><i class="fas fa-download"></i> Generate Report</button>
        </div>
        <div class="mb-3">
            <a href="dashboard.html" class="btn btn-secondary btn-sm"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        <div class="card">
            <div class="card-body" id="report-output">
                <p class="text-muted">Click "Generate Report" to view inspection‑ready compliance data.</p>
            </div>
        </div>
    </div>

    <script>
        // ---------- Supabase Client ----------
        const supabase = window.supabase.createClient(
            "https://rlfywkvyjoydpbvprtdt.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsZnl3a3Z5am95ZHBidnBydGR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMzQ2MTEsImV4cCI6MjA5NzkxMDYxMX0.oF3BnxQD0AE_47ypbIA39iV0FGICbXZJPwOgiZTcjMk"
        );

        // ---------- Auth Check ----------
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = "login.html";
                return null;
            }
            return user;
        }

        // ---------- Logout ----------
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        });

        // ---------- Helper Functions ----------
        async function getMissingDocuments(employeeId, nationality) {
            const { data: docs } = await supabase
                .from('documents')
                .select('doc_type')
                .eq('employee_id', employeeId);
            const existing = docs.map(d => d.doc_type);
            const required = ['CONTRACT'];
            if (nationality === 'South Africa') required.push('SA_ID');
            else required.push('PASSPORT', 'WORK_PERMIT');
            return required.filter(t => !existing.includes(t));
        }

        async function getExpiredPermits(employeeId) {
            const today = new Date().toISOString().split('T')[0];
            const { data } = await supabase
                .from('documents')
                .select('doc_type, expiry_date')
                .eq('employee_id', employeeId)
                .in('doc_type', ['WORK_PERMIT', 'VISA'])
                .lt('expiry_date', today);
            return data || [];
        }

        // ---------- Generate Report ----------
        async function generateReport() {
            const user = await checkUser();
            if (!user) return;

            const output = document.getElementById('report-output');
            output.innerHTML = '<div class="text-center"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Generating report...</p></div>';

            try {
                // 1. Fetch all employees
                const { data: employees, error: empError } = await supabase
                    .from('employees')
                    .select('*');
                if (empError) throw empError;

                if (!employees || employees.length === 0) {
                    output.innerHTML = '<div class="alert alert-info">No employees found.</div>';
                    return;
                }

                // 2. Build report data
                let reportData = [];
                for (const emp of employees) {
                    const missing = await getMissingDocuments(emp.id, emp.nationality);
                    const expired = await getExpiredPermits(emp.id);

                    let status = 'Compliant';
                    if (expired.length > 0) status = 'Expired Permit';
                    else if (missing.length > 0) status = 'Missing Documents';

                    reportData.push({
                        employee: emp,
                        missingDocuments: missing,
                        expiredPermits: expired,
                        status: status
                    });
                }

                // 3. Render table
                let html = `
                        <h5>Inspection Ready Report</h5>
                        <div class="table-responsive">
                            <table class="table table-bordered table-striped">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Employee</th>
                                        <th>ID/Passport</th>
                                        <th>Nationality</th>
                                        <th>Compliance Status</th>
                                        <th>Missing Documents</th>
                                        <th>Expired Permits/Visa</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;
                for (const item of reportData) {
                    const statusBadge = item.status === 'Compliant' ? 'bg-success' : 'bg-danger';
                    const missingStr = item.missingDocuments.length ? item.missingDocuments.join(', ') : 'None';
                    const expiredStr = item.expiredPermits.length
                        ? item.expiredPermits.map(p => `${p.doc_type} (expired ${p.expiry_date})`).join(', ')
                        : 'None';
                    html += `
                            <tr>
                                <td>${item.employee.full_name}</td>
                                <td>${item.employee.id_passport_number}</td>
                                <td>${item.employee.nationality}</td>
                                <td><span class="badge ${statusBadge}">${item.status}</span></td>
                                <td>${missingStr}</td>
                                <td>${expiredStr}</td>
                            </tr>
                        `;
                }
                html += `</tbody></table></div>`;
                output.innerHTML = html;

            } catch (err) {
                output.innerHTML = `<div class="alert alert-danger">Error loading report: ${err.message}</div>`;
                console.error(err);
            }
        }

        // ---------- Attach Event ----------
        document.getElementById('generate-report').addEventListener('click', generateReport);

        // Optional: auto‑run on page load?
        // checkUser(); // just to redirect if not logged in, but we can call it on load
        (async function init() {
            await checkUser();
        })();
    </script>
</body>
</html>
